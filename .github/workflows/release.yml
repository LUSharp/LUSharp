name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            artifact: lusharp-win-x64.zip
          - rid: linux-x64
            os: ubuntu-latest
            artifact: lusharp-linux-x64.tar.gz
          - rid: osx-x64
            os: macos-latest
            artifact: lusharp-osx-x64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: >
          dotnet publish LUSharp/LUSharp.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./artifacts/${{ matrix.rid }}/

      - name: Package (Windows)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: Compress-Archive -Path ./artifacts/${{ matrix.rid }}/* -DestinationPath ./artifacts/${{ matrix.artifact }}

      - name: Package (Linux/macOS)
        if: matrix.rid != 'win-x64'
        run: tar -czf ./artifacts/${{ matrix.artifact }} -C ./artifacts/${{ matrix.rid }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ./artifacts/${{ matrix.artifact }}

  plugin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rojo
        run: |
          gh release download --repo rojo-rbx/rojo --pattern 'rojo-*-linux-x86_64.zip' -D /tmp
          unzip /tmp/rojo-*-linux-x86_64.zip -d /usr/local/bin
          chmod +x /usr/local/bin/rojo
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build plugin
        run: rojo build plugin/plugin.project.json -o plugin/LUSharp-plugin.rbxmx

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LUSharp-plugin.rbxmx
          path: plugin/LUSharp-plugin.rbxmx

  release:
    needs: [build, plugin]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-assets
          merge-multiple: true

      - name: Get tag annotation
        id: tag_info
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          BODY=$(git tag -l --format='%(contents:body)' "$TAG")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag_info.outputs.tag }}
          body: ${{ steps.tag_info.outputs.body }}
          files: ./release-assets/*
